<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Builder — HKIC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#80BC00; --green-d:#6a9e00; --green-l:#eaf5c2;
  --dark:#1a1a1a; --grey:#636569; --grey-l:#98989A;
  --bg:#f0f0f0; --white:#fff; --border:#e0e0e0;
  --radius:12px; --shadow:0 4px 20px rgba(0,0,0,0.10);
}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}

/* ── HEADER ── */
header{background:#fff;height:64px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.07);border-bottom:3px solid var(--green);}
.header-left{display:flex;align-items:center;gap:14px;}
header img.logo{height:42px;}
.hdr-div{width:1.5px;height:32px;background:#e0e0e0;}
.hdr-title{font-size:1rem;font-weight:700;color:var(--dark);}
.hdr-sub{font-size:0.7rem;color:var(--grey-l);margin-top:1px;}
.hdr-right{display:flex;gap:10px;align-items:center;}
.btn-outline{background:transparent;border:1.5px solid var(--green);color:var(--green);padding:7px 16px;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-outline:hover{background:var(--green);color:#fff;}
.btn-solid{background:var(--green);border:none;color:#fff;padding:7px 16px;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
.btn-solid:hover{opacity:.88;}

/* ── PAGES ── */
.page{
  display:none;
  position:fixed;
  top:64px;left:0;right:0;bottom:0;
  overflow-y:auto;
  background:var(--bg);
  opacity:0;
  transform:translateY(12px);
  pointer-events:none;
  transition:opacity .35s ease, transform .35s ease;
  z-index:10;
}
.page.active{
  display:block;
  opacity:1;
  transform:translateY(0);
  pointer-events:all;
}

/* ══ PAGE: FORM ══ */
#page-form{padding:32px 20px 80px;}
.form-wrap{max-width:720px;margin:0 auto;}
.form-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:32px 36px;}
.form-card h2{font-size:1.15rem;font-weight:700;margin-bottom:4px;color:var(--dark);}
.form-card .desc{font-size:0.82rem;color:var(--grey-l);margin-bottom:28px;}
.sec-title{font-size:0.71rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--dark);border-bottom:2px solid var(--green);padding-bottom:6px;margin:24px 0 14px;}
.sec-title:first-of-type{margin-top:0;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.field.full{grid-column:1/-1;}
label{font-size:0.71rem;font-weight:600;color:var(--grey);}
input,textarea,select{border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;font-size:0.84rem;font-family:inherit;color:var(--dark);background:#fafafa;outline:none;transition:border .2s,box-shadow .2s;width:100%;}
input:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(128,188,0,0.13);background:#fff;}
textarea{resize:vertical;min-height:72px;}
.list-section{display:flex;flex-direction:column;gap:10px;}
.list-item{background:#f7f7f7;border:1.5px solid var(--border);border-radius:8px;padding:14px 14px 8px;position:relative;}
.rm-btn{position:absolute;top:9px;right:9px;background:#fee2e2;color:#dc2626;border:none;border-radius:5px;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:800;}
.rm-btn:hover{background:#fecaca;}
.add-btn{border:2px dashed var(--border);background:transparent;color:var(--green-d);border-radius:8px;padding:9px;font-size:0.8rem;font-weight:700;cursor:pointer;width:100%;transition:all .2s;}
.add-btn:hover{border-color:var(--green);background:var(--green-l);}
.skills-row{display:flex;gap:8px;margin-bottom:6px;}
.skills-row input{flex:1;}
.skills-row .add-skill{background:var(--green);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-weight:700;font-size:0.8rem;cursor:pointer;white-space:nowrap;}
.skills-row .add-skill:hover{background:var(--green-d);}
.skill-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.skill-tag{background:var(--green-l);color:var(--green-d);border:1.5px solid #b5d96b;border-radius:20px;padding:3px 10px 3px 12px;font-size:0.76rem;font-weight:700;display:flex;align-items:center;gap:6px;}
.skill-tag .x{cursor:pointer;color:#9dc840;font-weight:800;}
.skill-tag .x:hover{color:var(--green-d);}
.form-bottom{margin-top:32px;display:flex;justify-content:center;}
.btn-generate{background:var(--green);border:none;color:#fff;padding:14px 48px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(128,188,0,0.35);letter-spacing:.3px;}
.btn-generate:hover{background:var(--green-d);box-shadow:0 6px 20px rgba(128,188,0,0.45);transform:translateY(-1px);}

/* ══ PAGE: LOADING ══ */
#page-loading{display:flex;align-items:center;justify-content:center;}
.loading-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:52px 60px;text-align:center;max-width:400px;width:90%;}
.loading-card img{height:48px;margin-bottom:28px;}
.ai-anim{width:56px;height:56px;border:4px solid var(--green-l);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-msg{font-size:0.95rem;font-weight:600;color:var(--dark);margin-bottom:18px;min-height:24px;}
.progress-bar{width:100%;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .6s ease;}
.loading-hint{font-size:0.74rem;color:var(--grey-l);margin-top:12px;}

/* ══ PAGE: RESULT ══ */
#page-result{display:flex;}
.result-preview{flex:1;overflow-y:auto;background:#dcdcdc;padding:28px;display:flex;justify-content:center;align-items:flex-start;height:100%;}
.result-preview::-webkit-scrollbar{width:5px;}
.result-preview::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px;}
.result-sidebar{width:280px;background:#fff;border-left:1px solid var(--border);display:flex;flex-direction:column;padding:24px 20px;overflow-y:auto;gap:0;height:100%;}
.result-sidebar::-webkit-scrollbar{width:4px;}
.result-sidebar::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
.sidebar-block{margin-bottom:22px;}
.sidebar-label{font-size:0.68rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--grey-l);margin-bottom:10px;}
.theme-btns{display:flex;flex-direction:column;gap:6px;}
.theme-pick{border:1.5px solid var(--border);background:#fafafa;color:var(--dark);border-radius:8px;padding:9px 12px;font-size:0.79rem;font-weight:600;cursor:pointer;text-align:left;transition:all .2s;display:flex;align-items:center;gap:8px;}
.theme-pick .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.theme-pick:hover{border-color:var(--green);background:var(--green-l);}
.theme-pick.active{border-color:var(--green);background:var(--green-l);color:var(--green-d);}
.sidebar-divider{height:1px;background:var(--border);margin:4px 0 22px;}
.dl-btn{display:flex;align-items:center;gap:10px;width:100%;border:1.5px solid var(--border);background:#fafafa;border-radius:8px;padding:11px 13px;font-size:0.81rem;font-weight:600;color:var(--dark);cursor:pointer;transition:all .2s;margin-bottom:8px;text-align:left;}
.dl-btn .ic{font-size:1.1rem;flex-shrink:0;}
.dl-btn:hover{border-color:var(--green);background:var(--green-l);color:var(--green-d);}
.dl-btn-sub{font-size:0.68rem;color:var(--grey-l);font-weight:400;margin-top:1px;display:block;}
.btn-reedit{width:100%;border:1.5px solid var(--border);background:transparent;color:var(--grey);border-radius:8px;padding:9px;font-size:0.78rem;font-weight:600;cursor:pointer;margin-top:auto;}
.btn-reedit:hover{background:#f4f4f4;}

/* ── MODALS ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:var(--radius);padding:32px;max-width:400px;width:92%;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.2);}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:6px;}
.modal .modal-sub{font-size:0.8rem;color:var(--grey-l);margin-bottom:22px;}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--grey-l);}
.modal-close:hover{color:var(--dark);}
#qr-box{display:flex;justify-content:center;margin:16px 0;}
#qr-box canvas,#qr-box img{border:4px solid var(--green-l);border-radius:8px;}
.qr-url{font-size:0.7rem;color:var(--grey-l);text-align:center;word-break:break-all;margin-top:8px;}
.modal input{width:100%;margin-bottom:12px;}
.modal .btn-solid{width:100%;padding:11px;}
.modal-status{font-size:0.78rem;color:var(--grey-l);text-align:center;margin-top:10px;min-height:18px;}
.modal-status.err{color:#dc2626;}
.modal-status.ok{color:var(--green-d);}
.spinner-sm{display:inline-block;width:14px;height:14px;border:2px solid var(--green-l);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}

/* ══ CV: STYLES ══ */
/* --- Theme 1: Clean --- */
#cv-out.t-clean{background:#fff;font-family:"Georgia",serif;color:#1a1a1a;padding:50px 54px;width:100%;max-width:740px;box-shadow:0 4px 24px rgba(0,0,0,.13);border-top:5px solid #80BC00;}
.t-clean .cv-logo-row{display:flex;justify-content:flex-end;margin-bottom:18px;}
.t-clean .cv-logo-row img{height:34px;}
.t-clean .cv-name{font-size:2.1rem;font-weight:700;color:#111;line-height:1.1;}
.t-clean .cv-role{font-size:.95rem;color:#636569;font-style:italic;margin:4px 0 14px;}
.t-clean .cv-contact{display:flex;flex-wrap:wrap;font-size:.78rem;color:#555;border-top:2.5px solid #1a1a1a;border-bottom:1px solid #ddd;padding:8px 0;margin-bottom:18px;}
.t-clean .cv-contact span{margin-right:16px;}
.t-clean .cv-sec{font-size:.74rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#1a1a1a;margin:20px 0 9px;padding-bottom:4px;border-bottom:2px solid #80BC00;}
.t-clean .cv-summary{font-size:.85rem;line-height:1.75;color:#333;}
.t-clean .cv-item{margin-bottom:13px;}
.t-clean .cv-row{display:flex;justify-content:space-between;align-items:baseline;}
.t-clean .cv-ititle{font-weight:700;font-size:.92rem;}
.t-clean .cv-date{font-size:.74rem;color:#636569;font-style:italic;white-space:nowrap;margin-left:10px;}
.t-clean .cv-org{font-size:.82rem;color:#80BC00;font-weight:600;margin:2px 0 3px;}
.t-clean .cv-desc{font-size:.8rem;color:#444;line-height:1.65;}
.t-clean .cv-skills{display:flex;flex-wrap:wrap;gap:7px;}
.t-clean .cv-skill{border:1.5px solid #80BC00;padding:3px 11px;font-size:.75rem;color:#3a5a00;background:#f0f8d8;font-family:"Segoe UI",sans-serif;}

/* --- Theme 2: Modern HKIC --- */
#cv-out.t-modern{background:#fff;font-family:"Segoe UI",system-ui,sans-serif;width:100%;max-width:740px;box-shadow:0 4px 24px rgba(0,0,0,.13);border-radius:8px;overflow:hidden;display:grid;grid-template-columns:210px 1fr;}
.t-modern .cv-sidebar{background:#1a1a1a;color:#fff;padding:34px 18px 26px;display:flex;flex-direction:column;border-right:3px solid #80BC00;}
.t-modern .cv-avatar{width:66px;height:66px;border-radius:50%;background:rgba(128,188,0,.18);border:3px solid #80BC00;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;color:#80BC00;}
.t-modern .cv-name{font-size:1.1rem;font-weight:700;text-align:center;line-height:1.3;margin-bottom:3px;}
.t-modern .cv-role{font-size:.72rem;text-align:center;color:#80BC00;font-weight:600;margin-bottom:18px;}
.t-modern .sb-sec{margin-top:16px;}
.t-modern .sb-title{font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#80BC00;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid rgba(128,188,0,.25);}
.t-modern .sb-row{display:flex;align-items:flex-start;gap:6px;font-size:.72rem;color:#ccc;margin-bottom:5px;line-height:1.4;}
.t-modern .sb-ic{color:#80BC00;flex-shrink:0;width:13px;}
.t-modern .sk-entry{margin-bottom:7px;}
.t-modern .sk-name{font-size:.71rem;color:#ccc;margin-bottom:3px;}
.t-modern .sk-dots{display:flex;gap:3px;}
.t-modern .sk-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);}
.t-modern .sk-dot.on{background:#80BC00;}
.t-modern .sb-logo{margin-top:auto;padding-top:18px;border-top:1px solid rgba(128,188,0,.22);display:flex;justify-content:center;}
.t-modern .sb-logo img{height:28px;}
.t-modern .cv-main{padding:30px 26px;background:#fff;}
.t-modern .cv-sec{font-size:.69rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#80BC00;margin:18px 0 10px;display:flex;align-items:center;gap:7px;}
.t-modern .cv-sec::after{content:"";flex:1;height:1.5px;background:linear-gradient(to right,#b8de60,transparent);}
.t-modern .cv-sec:first-child{margin-top:0;}
.t-modern .cv-summary{font-size:.82rem;line-height:1.75;color:#555;}
.t-modern .cv-item{margin-bottom:13px;}
.t-modern .cv-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.t-modern .cv-ititle{font-weight:700;font-size:.88rem;color:#1a1a1a;}
.t-modern .badge{background:#e8f5c8;color:#4a7200;font-size:.67rem;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;border:1px solid #b5d96b;}
.t-modern .cv-org{font-size:.77rem;color:#636569;font-weight:600;margin:2px 0 3px;}
.t-modern .cv-desc{font-size:.78rem;color:#666;line-height:1.65;}

/* --- Theme 3: Pro Two-Column --- */
#cv-out.t-pro{background:#fff;font-family:"Segoe UI",system-ui,sans-serif;width:100%;max-width:740px;box-shadow:0 4px 24px rgba(0,0,0,.13);}
.t-pro .cv-header{background:#2e2e2e;color:#fff;padding:28px 36px 22px;display:flex;justify-content:space-between;align-items:center;}
.t-pro .cv-header-left{}
.t-pro .cv-name{font-size:1.9rem;font-weight:700;letter-spacing:.5px;line-height:1.1;}
.t-pro .cv-role{font-size:.88rem;color:#80BC00;font-weight:600;margin-top:4px;}
.t-pro .cv-contact{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;}
.t-pro .cv-c-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:#bbb;}
.t-pro .cv-c-ic{color:#80BC00;font-size:.8rem;}
.t-pro .cv-header-logo img{height:36px;opacity:.9;}
.t-pro .cv-body{display:grid;grid-template-columns:1fr 1.75fr;}
.t-pro .cv-col-l{padding:26px 22px;background:#f7f7f7;border-right:1px solid #e8e8e8;}
.t-pro .cv-col-r{padding:26px 28px;}
.t-pro .cv-sec{font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#2e2e2e;margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
.t-pro .cv-sec::before{content:"";width:4px;height:14px;background:#80BC00;border-radius:2px;flex-shrink:0;}
.t-pro .cv-sec:first-child{margin-top:0;}
.t-pro .cv-summary{font-size:.82rem;line-height:1.75;color:#444;}
.t-pro .cv-item{margin-bottom:14px;}
.t-pro .cv-row{display:flex;justify-content:space-between;align-items:baseline;}
.t-pro .cv-ititle{font-weight:700;font-size:.88rem;color:#1a1a1a;}
.t-pro .cv-date{font-size:.71rem;color:#80BC00;font-weight:600;white-space:nowrap;margin-left:8px;}
.t-pro .cv-org{font-size:.78rem;color:#636569;margin:2px 0 3px;}
.t-pro .cv-desc{font-size:.78rem;color:#555;line-height:1.65;}
.t-pro .cv-skills{display:flex;flex-wrap:wrap;gap:6px;}
.t-pro .cv-skill{background:#fff;border:1.5px solid #80BC00;color:#3a5a00;padding:3px 10px;font-size:.73rem;font-weight:600;border-radius:4px;}
.t-pro .cv-edu-item{margin-bottom:12px;}
.t-pro .cv-edu-school{font-weight:700;font-size:.86rem;}
.t-pro .cv-edu-deg{font-size:.78rem;color:#636569;margin:2px 0;}
.t-pro .cv-edu-yr{font-size:.7rem;color:#80BC00;font-weight:600;}

@media print{
  header,.result-sidebar{display:none!important;}
  #page-result{display:flex!important;height:auto;}
  .result-preview{background:#fff;padding:0;}
  #cv-out{box-shadow:none!important;max-width:100%!important;}
}
</style>
</head>
<body>

<!-- ══ PAGE: FORM ══ -->
<div class="page active" id="page-form">
  <div id="form-wrap" class="form-wrap">
    <div class="form-card">
      <h2>填寫你的個人資料</h2>
      <p class="desc">完成後按「生成我的 CV」，AI 將為你設計一份專業履歷</p>

      <div class="sec-title">👤 個人資料</div>
      <div class="field-row">
        <div class="field"><label>全名</label><input id="f-name" placeholder="陳大文"></div>
        <div class="field"><label>職稱 / 崗位</label><input id="f-title" placeholder="建築工程師"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>電郵</label><input id="f-email" type="email" placeholder="name@email.com"></div>
        <div class="field"><label>電話</label><input id="f-phone" placeholder="+852 9xxx xxxx"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>地點</label><input id="f-location" placeholder="香港"></div>
        <div class="field"><label>網站 / LinkedIn</label><input id="f-website" placeholder="linkedin.com/in/..."></div>
      </div>
      <div class="field full"><label>個人簡介</label><textarea id="f-summary" placeholder="簡短介紹你的背景、強項和目標…"></textarea></div>

      <div class="sec-title">🎓 學歷</div>
      <div class="list-section" id="edu-list"></div>
      <button class="add-btn" onclick="addItem('edu')">＋ 新增學歷</button>

      <div class="sec-title">💼 工作經驗</div>
      <div class="list-section" id="exp-list"></div>
      <button class="add-btn" onclick="addItem('exp')">＋ 新增工作經驗</button>

      <div class="sec-title">🛠 技能</div>
      <div class="skills-row">
        <input id="skill-input" placeholder="例如：AutoCAD" onkeydown="if(event.key==='Enter'){addSkill();event.preventDefault();}">
        <button class="add-skill" onclick="addSkill()">新增</button>
      </div>
      <div class="skill-tags" id="skill-tags"></div>

      <div class="sec-title">🏆 成就 / 項目</div>
      <div class="list-section" id="ach-list"></div>
      <button class="add-btn" onclick="addItem('ach')">＋ 新增成就或項目</button>

      <div class="form-bottom">
        <button class="btn-generate" onclick="startGenerate()">✨ 生成我的 CV</button>
      </div>
    </div>
  </div>
</div>

<script>
var skills=[], items={edu:[],exp:[],ach:[]}, currentTheme='t-clean', sharedUrl=null;

// ── HEADER BUTTONS ──
function setHdr(page){
  var r=document.getElementById('hdr-right');
  if(page==='result'){
    r.innerHTML='<button class="btn-outline" onclick="goEdit()">← 返回編輯</button>';
  } else {
    r.innerHTML='';
  }
}

// ── LIST ITEMS ──
function addItem(t){
  var id=Date.now()+Math.random();
  var d={edu:{school:'',degree:'',year:'',desc:''},exp:{company:'',role:'',period:'',desc:''},ach:{title:'',org:'',desc:''}};
  items[t].push(Object.assign({_id:id},d[t]));
  renderList(t);
}
function removeItem(t,id){items[t]=items[t].filter(function(x){return x._id!=id;});renderList(t);}
function renderList(t){
  var c=document.getElementById(t+'-list'); c.innerHTML='';
  items[t].forEach(function(item,idx){
    var div=document.createElement('div');div.className='list-item';
    div.innerHTML=buildItemHTML(t,item);c.appendChild(div);
    div.querySelector('.rm-btn').addEventListener('click',function(){removeItem(t,item._id);});
    div.querySelectorAll('[data-f]').forEach(function(el){
      el.addEventListener('input',function(){items[t][idx][el.dataset.f]=el.value;});
    });
  });
}
function buildItemHTML(t,item){
  var rm='<button class="rm-btn">✕</button>';
  if(t==='edu')return rm+'<div class="field-row"><div class="field"><label>學校 / 院校</label><input data-f="school" value="'+esc(item.school)+'" placeholder="香港大學"></div><div class="field"><label>學位 / 課程</label><input data-f="degree" value="'+esc(item.degree)+'" placeholder="土木工程學士"></div></div><div class="field full"><label>年份</label><input data-f="year" value="'+esc(item.year)+'" placeholder="2018 – 2022"></div><div class="field full"><label>備註</label><textarea data-f="desc" placeholder="GPA、獎學金…">'+esc(item.desc)+'</textarea></div>';
  if(t==='exp')return rm+'<div class="field-row"><div class="field"><label>公司名稱</label><input data-f="company" value="'+esc(item.company)+'" placeholder="建業工程有限公司"></div><div class="field"><label>職位</label><input data-f="role" value="'+esc(item.role)+'" placeholder="項目工程師"></div></div><div class="field full"><label>在職期間</label><input data-f="period" value="'+esc(item.period)+'" placeholder="2022年1月 – 現在"></div><div class="field full"><label>工作描述</label><textarea data-f="desc" placeholder="主要職責、成就…">'+esc(item.desc)+'</textarea></div>';
  if(t==='ach')return rm+'<div class="field-row"><div class="field"><label>標題 / 項目名</label><input data-f="title" value="'+esc(item.title)+'" placeholder="優秀員工獎"></div><div class="field"><label>機構 / 年份</label><input data-f="org" value="'+esc(item.org)+'" placeholder="公司名 · 2023"></div></div><div class="field full"><label>描述</label><textarea data-f="desc" placeholder="詳細說明…">'+esc(item.desc)+'</textarea></div>';
  return '';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function addSkill(){var i=document.getElementById('skill-input'),v=i.value.trim();if(!v||skills.indexOf(v)>=0)return;skills.push(v);i.value='';renderSkills();}
function removeSkill(s){skills=skills.filter(function(x){return x!==s;});renderSkills();}
function renderSkills(){document.getElementById('skill-tags').innerHTML=skills.map(function(s){return '<span class="skill-tag">'+esc(s)+'<span class="x" onclick="removeSkill(\''+esc(s)+'\')">✕</span></span>';}).join('');}

// ── FLOW ──
function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){
    p.classList.remove('active');
    p.style.removeProperty('display');
    p.style.removeProperty('flex');
  });
  window.scrollTo(0,0);
  var pg=document.getElementById(id);
  if(id==='page-result'){
    pg.style.display='flex';
    // force reflow then add active
    void pg.offsetWidth;
    pg.classList.add('active');
  } else {
    pg.classList.add('active');
  }
  setHdr(id==='page-result'?'result':'form');
}

function startGenerate(){
  // collect latest values from DOM
  showPage('page-loading');
  sharedUrl=null;
  var steps=[
    {msg:'📋 分析個人資料…',p:18},
    {msg:'🎨 設計 CV 版面…',p:40},
    {msg:'✍️ AI 優化內容…',p:65},
    {msg:'🔧 最後潤色…',p:85},
    {msg:'✅ 完成！',p:100}
  ];
  var i=0;
  function tick(){
    if(i<steps.length){
      document.getElementById('loading-msg').textContent=steps[i].msg;
      document.getElementById('prog').style.width=steps[i].p+'%';
      i++;setTimeout(tick,i===steps.length?600:780);
    } else {
      renderCV(currentTheme);
      showPage('page-result');
    }
  }
  setTimeout(tick,300);
}

function goEdit(){showPage('page-form');}

// ── THEME ──
function pickTheme(t,btn){
  currentTheme=t;
  document.querySelectorAll('.theme-pick').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderCV(t);

function logoImg(h){return '<img src="'+LOGO+'" alt="HKIC" style="height:'+h+'px;width:auto">';}
function g(id){var e=document.getElementById(id);return e?e.value.trim():'';}

function renderCV(theme){
  var cv=document.getElementById('cv-out');
  cv.className=theme;
  var name=g('f-name'),title=g('f-title'),email=g('f-email'),phone=g('f-phone'),loc=g('f-location'),web=g('f-website'),sum=g('f-summary');
  if(theme==='t-clean')renderClean(cv,name,title,email,phone,loc,web,sum);
  else if(theme==='t-modern')renderModern(cv,name,title,email,phone,loc,web,sum);
  else renderPro(cv,name,title,email,phone,loc,web,sum);
}

function buildExpHTML(cls){
  return items.exp.filter(function(e){return e.company||e.role;}).map(function(e){
    return '<div class="cv-item"><div class="cv-row"><span class="cv-ititle">'+esc(e.role)+'</span><span class="cv-date">'+esc(e.period)+'</span></div>'+(e.company?'<div class="cv-org">'+esc(e.company)+'</div>':'')+(e.desc?'<div class="cv-desc">'+esc(e.desc)+'</div>':'')+'</div>';
  }).join('');
}

function renderClean(cv,name,title,email,phone,loc,web,sum){
  var contacts=[email,phone,loc,web].filter(Boolean).map(function(c){return '<span>'+esc(c)+'</span>';}).join('');
  var skH=skills.length?'<div class="cv-skills">'+skills.map(function(s){return '<span class="cv-skill">'+esc(s)+'</span>';}).join('')+'</div>':'';
  var expH=buildExpHTML(),eduH=buildEduHTML(),achH=buildAchHTML();

// ── UPLOAD & SHARE ──
function buildCVHTML(){
  var cv=document.getElementById('cv-out');
  var styles=document.querySelector('style').innerHTML;
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>CV</title><style>body{margin:0;padding:40px;background:#e0e0e0;display:flex;justify-content:center;}'+styles+'</style></head><body>'+cv.outerHTML+'</body></html>';
}

async function uploadCV(){
  if(sharedUrl) return sharedUrl;
  var cvHTML=buildCVHTML();
  var blob=new Blob([cvHTML],{type:'text/html'});

  // Try 1: gofile.io (reliable CORS)
  try{
    var sr=await fetch('https://api.gofile.io/servers');
    var sd=await sr.json();
    var server=sd.data.servers[0].name;
    var form=new FormData();form.append('file',blob,'cv.html');
    var ur=await fetch('https://'+server+'.gofile.io/contents/uploadfile',{method:'POST',body:form});
    var ud=await ur.json();
    if(ud.status==='ok'){sharedUrl=ud.data.downloadPage;return sharedUrl;}
  }catch(e){console.warn('gofile failed:',e);}

  // Try 2: litterbox.catbox.moe (temp 24h hosting)
  try{
    var form2=new FormData();
    form2.append('reqtype','fileupload');
    form2.append('time','24h');
    form2.append('fileToUpload',blob,'cv.html');
    var r2=await fetch('https://litterbox.catbox.moe/resources/internals/api.php',{method:'POST',body:form2});
    var u2=await r2.text();
    if(u2.startsWith('https://')){sharedUrl=u2.trim();return sharedUrl;}
  }catch(e){console.warn('litterbox failed:',e);}

  // Try 3: oshi.at
  try{
    var form3=new FormData();form3.append('f',blob,'cv.html');
    var r3=await fetch('https://oshi.at/',{method:'POST',body:form3});
    var t3=await r3.text();
    var m3=t3.match(/https:\/\/oshi\.at\/\S+/);
    if(m3){sharedUrl=m3[0];return sharedUrl;}
  }catch(e){console.warn('oshi.at failed:',e);}

  return null;
}

// Local download fallback
function downloadCVLocally(){
  var html=buildCVHTML();
  var blob=new Blob([html],{type:'text/html'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='my-cv.html';a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},3000);
}

async function openQR(){
  document.getElementById('qr-modal').classList.add('open');

  document.getElementById('qr-url-text').textContent='';
  document.getElementById('qr-status').innerHTML='';
  var url=await uploadCV();
  if(!url){
    box.innerHTML='';
    document.getElementById('qr-url-text').textContent='';
    document.getElementById('qr-status').innerHTML=
      '<div style="color:#dc2626;margin-bottom:10px">⚠️ 無法上傳至雲端（網絡限制）</div>'
      +'<button onclick="downloadCVLocally();closeModal(\'qr-modal\')" style="background:#80BC00;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-weight:700;cursor:pointer;font-size:.85rem;width:100%">⬇️ 儲存至本機後手動分享</button>';
    document.getElementById('qr-status').className='modal-status';
    return;
  }
  box.innerHTML='<div id="qr-canvas"></div>';
  new QRCode(document.getElementById('qr-canvas'),{text:url,width:190,height:190,colorDark:'#1a1a1a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  document.getElementById('qr-url-text').textContent=url;
  document.getElementById('qr-status').innerHTML='<span style="color:#80BC00">✅ 連結有效期 24 小時</span>';
}

// ── EMAIL MODAL ──
async function openEmail(){
  document.getElementById('email-modal').classList.add('open');
  document.getElementById('email-input').value=g('f-email');
  document.getElementById('email-status').textContent='';
  document.getElementById('email-status').className='modal-status';
}
async function sendEmail(){
  var email=document.getElementById('email-input').value.trim();
  if(!email){document.getElementById('email-status').textContent='請輸入電郵地址';document.getElementById('email-status').className='modal-status err';return;}
  var st=document.getElementById('email-status');
  st.innerHTML='<span class="spinner-sm"></span>上傳中…';st.className='modal-status';
  var url=await uploadCV();
  if(!url){
    st.innerHTML='<div style="color:#dc2626;margin-bottom:8px">⚠️ 無法上傳至雲端</div><button onclick="downloadCVLocally();closeModal(\'email-modal\')" style="background:#80BC00;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:700;cursor:pointer;font-size:.82rem">⬇️ 儲存至本機後手動傳送</button>';
    st.className='modal-status';return;}
  var name=g('f-name')||'我';
  var subject=encodeURIComponent(name+' 的 CV — 香港建造學院');
  var body=encodeURIComponent('你好！\n\n請點擊以下連結下載 '+name+' 的 CV：\n\n'+url+'\n\n（連結有效期為 14 天）\n\n香港建造學院 CV Builder');
  window.open('mailto:'+encodeURIComponent(email)+'?subject='+subject+'&body='+body);
  st.textContent='✅ 已開啟電郵，請確認並發送';st.className='modal-status ok';
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-bg').forEach(function(m){m.addEventListener('click',function(e){if(e.target===m)m.classList.remove('open');});});

// init
renderList('edu');renderList('exp');renderList('ach');
</script>
